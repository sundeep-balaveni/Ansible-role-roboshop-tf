- name: installing redis
  hosts: redis
  become: yes

  tasks:

    - name: Update packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Redis
      ansible.builtin.dnf:
        name: redis
        state: present

    - name: Start Redis
      ansible.builtin.service:
        name: redis
        state: started
        enabled: yes

    - name: Allow remote connections
      ansible.builtin.replace:
        path: /etc/redis/redis.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'

    - name: Disable protected mode
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^protected-mode'
        line: 'protected-mode no'

    - name: Restart Redis
      ansible.builtin.service:
        name: redis
        state: restarted