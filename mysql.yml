- name: Install MySQL server
  hosts: mysql
  become: yes

  vars:
    mysql_root_password: "RoboShop@1"

  tasks:

    - name: Add MySQL 8 official repo
      ansible.builtin.get_url:
        url: https://dev.mysql.com/get/mysql80-community-release-el7-3.noarch.rpm
        dest: /tmp/mysql80-community-release-el7-3.noarch.rpm

    - name: Install MySQL repo package
      ansible.builtin.dnf:
        name: /tmp/mysql80-community-release-el7-3.noarch.rpm
        state: present

    - name: Install MySQL server
      ansible.builtin.dnf:
        name: mysql-community-server
        state: present

    - name: Start MySQL service
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes

    - name: Install Python MySQL library
      ansible.builtin.dnf:
        name: python3-PyMySQL
        state: present

    - name: Set root password
      community.mysql.mysql_user:
        name: root
        host: localhost
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock